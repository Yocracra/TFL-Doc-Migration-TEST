site_name: TAMU Fab Lab Documentation
site_description: Unified operations, safety, and learning documentation for TAMU Fab Lab.
site_url: https://yocracra.github.io/TFL-Doc-Migration-TEST/
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.instant
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber

plugins:
  - search
  - table-reader

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/sidebar-collapse.js
  - https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js

